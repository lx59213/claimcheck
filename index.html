<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClaimCheck · 概览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <div class="main">
    <div class="main-hd">
      <div class="bc"><span class="cur">概览</span></div>
    </div>
    <div class="main-bd" id="content"></div>
  </div>
</div>
<script src="app.js"></script>
<script>
document.body.insertAdjacentHTML('beforeend', sharedOverlay());
renderSidebar('home');

const all = getAllProducts();
const scannedList = all.filter(p => isScanned(p.id));
const scannedCount = scannedList.length;
const totalRisks = scannedList.reduce((a, p) => a + p.stats.risks, 0);
const totalComplaints = scannedList.reduce((a, p) => a + p.stats.complaints, 0);

const productCards = all.map(p => {
  const sc = isScanned(p.id);
  const dotColor = sc ? (STATUS_COLOR[p.status] || 'var(--ok)') : 'var(--text-4)';
  const statusHtml = sc
    ? `<div style="display:flex;gap:10px;margin-top:8px">
        <div><span style="font-size:18px;font-weight:700;color:${p.stats.highRisk > 0 ? 'var(--danger)' : 'var(--text-1)'}">${p.stats.risks}</span><span style="font-size:10px;color:var(--text-3);margin-left:3px">风险</span></div>
        <div><span style="font-size:18px;font-weight:700;color:${p.stats.complaints > 3 ? 'var(--warn)' : 'var(--text-1)'}">${p.stats.complaints}</span><span style="font-size:10px;color:var(--text-3);margin-left:3px">客诉</span></div>
      </div>`
    : '<div style="margin-top:10px"><span class="tag" style="background:var(--bg);color:var(--text-3)">待审核</span></div>';
  return `<div class="arc-card" onclick="setCurrentProductId('${p.id}');location.href='presale.html'" style="display:flex;gap:14px;align-items:flex-start">
    <img src="${p.image}" style="width:56px;height:56px;border-radius:var(--r);object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
        <span style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0"></span>
        <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span>
      </div>
      <div style="font-size:11px;color:var(--text-3)">${p.industry} · ${p.platform}</div>
      ${statusHtml}
    </div>
  </div>`;
}).join('');

document.getElementById('content').innerHTML = `
  <div class="au">
    <div class="kpi-grid au d1">
      <div class="kpi" onclick="location.href='archive.html'">
        <div class="kpi-top"><div class="kpi-ic red"><i class="ph-fill ph-warning"></i></div>${totalRisks > 0 ? '<div class="tag tag-r">需处理</div>' : ''}</div>
        <div style="display:flex;align-items:end;justify-content:space-between">
          <div><div class="kpi-val ${totalRisks > 0 ? 'r' : ''}">${totalRisks}</div><div class="kpi-lbl">风险项</div></div>
          ${sparkline([3,4,8,6,7,totalRisks || 1], 64, 24, totalRisks > 0 ? 'var(--danger)' : 'var(--text-4)')}
        </div>
      </div>
      <div class="kpi" onclick="location.href='aftersale.html'">
        <div class="kpi-top"><div class="kpi-ic amber"><i class="ph-fill ph-chat-circle-text"></i></div>${totalComplaints > 0 ? '<div class="tag tag-o">客诉</div>' : ''}</div>
        <div style="display:flex;align-items:end;justify-content:space-between">
          <div><div class="kpi-val ${totalComplaints > 0 ? 'o' : ''}">${totalComplaints}</div><div class="kpi-lbl">本月客诉</div></div>
          ${sparkline([2,1,5,3,4,totalComplaints || 1], 64, 24, totalComplaints > 0 ? 'var(--warn)' : 'var(--text-4)')}
        </div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-ic green"><i class="ph-fill ph-shield-check"></i></div><div class="tag tag-g">${scannedCount}/${all.length}</div></div>
        <div style="display:flex;align-items:end;justify-content:space-between">
          <div><div class="kpi-val">${all.length}</div><div class="kpi-lbl">商品</div></div>
          ${sparkline([1,1,2,2,3,all.length], 64, 24, 'var(--ok)')}
        </div>
      </div>
    </div>

    <div class="sec-h au d2"><i class="ph ph-tote"></i> 商品</div>
    <div class="arc-grid au d2" style="grid-template-columns:repeat(3,1fr)">${productCards}</div>

    <div class="au d3" style="margin-top:24px">
      <div class="sec-h"><i class="ph ph-sparkle"></i> AI 动态 <span style="font-size:10px;color:var(--text-3);font-weight:400">实时监控 · 洞察 · 学习</span></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--danger);margin-top:5px;flex-shrink:0"></span><div><a onclick="setCurrentProductId('jacket');location.href='aftersale.html'" href="javascript:void(0)" style="font-weight:500">收到客诉：口袋没压胶</a> <span style="font-size:10px;color:var(--text-3)">2h · 天猫客服 · 冲锋衣</span></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--danger);margin-top:5px;flex-shrink:0"></span><div><strong>"全压胶"措辞风险预警</strong> 同类品牌曾因此表述引发舆论，建议上架前修改。<div class="ai-link" onclick="openTrend('jacket')">查看趋势 <i class="ph ph-arrow-right"></i></div></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--danger);margin-top:5px;flex-shrink:0"></span><div><a onclick="setCurrentProductId('base');location.href='presale.html'" href="javascript:void(0)" style="font-weight:500">AI 检测到医疗暗示风险</a> <span style="font-size:10px;color:var(--text-3)">5h · 打底衫详情页 · 自动扫描</span></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--warn);margin-top:5px;flex-shrink:0"></span><div><strong>降燥打底衫 多项风险叠加</strong> 医疗暗示 + 功能宣称缺证据 + 尺码认知偏差。<div class="ai-link" onclick="setCurrentProductId('base');location.href='presale.html'">查看 <i class="ph ph-arrow-right"></i></div></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--warn);margin-top:5px;flex-shrink:0"></span><div><a href="archive.html" style="font-weight:500">平台规则更新：违禁词清单</a> <span style="font-size:10px;color:var(--text-3)">8h · 天猫 · +12项</span></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--accent);margin-top:5px;flex-shrink:0"></span><div><a onclick="setCurrentProductId('jacket');location.href='kb.html'" href="javascript:void(0)" style="font-weight:500">知识库更新：冲锋衣国标 + 舆情案例</a> <span style="font-size:10px;color:var(--text-3)">12h · 6条依据已关联风险项</span></div></div>
        <div class="ai-card" style="display:flex;align-items:flex-start;gap:10px"><span class="tl-dot" style="background:var(--ok);margin-top:5px;flex-shrink:0"></span><div><a onclick="setCurrentProductId('jacket');location.href='presale.html'" href="javascript:void(0)" style="font-weight:500">冲锋衣审核完成</a> <span style="font-size:10px;color:var(--text-3)">1d · 第3次 · 3高危 1中危 1低危</span></div></div>
      </div>
    </div>
  </div>`;
</script>
</body>
</html>
