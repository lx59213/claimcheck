<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClaimCheck · 知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <div class="main">
    <div class="main-hd" id="header"></div>
    <div class="main-bd" id="content"></div>
  </div>
</div>
<script src="app.js"></script>
<script>
document.body.insertAdjacentHTML('beforeend', sharedOverlay());
renderSidebar('kb');

const p = getProduct();
const pid = getCurrentProductId();
const entries = getKB(pid);

document.getElementById('header').innerHTML = `
  <div class="bc"><a href="index.html">概览</a><span class="sep">/</span><span class="cur">${p.name} · 知识库</span></div>`;

const coveredRisks = new Set();
entries.forEach(e => e.relatedRisks.forEach(r => coveredRisks.add(r)));
const totalRiskKw = new Set(p.risks.map(r => r.kw));
const coverCount = [...coveredRisks].filter(r => totalRiskKw.has(r)).length;

let kbFilter = getState('kb_filter_' + pid, 'all');

function renderKB() {
  const filtered = kbFilter === 'all' ? entries : entries.filter(e => e.type === kbFilter);

  const hlTarget = getState('kb_highlight', '');

  const cards = filtered.map(e => {
    const meta = KB_TYPES[e.type] || KB_TYPES.law;
    const isHl = hlTarget && e.id === hlTarget;
    return `<div class="rc ${isHl ? 'open flash' : ''}" id="kb-${e.id}" onclick="this.classList.toggle('open')">
      <div class="rc-h">
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:${meta.color};flex-shrink:0">
          <i class="ph ${meta.icon}" style="font-size:13px"></i> ${meta.label}
        </span>
        <span class="rc-kw">${e.title}</span>
        <span class="rc-ch"><i class="ph ph-caret-down"></i></span>
      </div>
      <div class="rc-body"><div class="rc-in">
        <div style="font-size:12px;color:var(--text-2);line-height:1.6;margin-bottom:10px">${e.detail.replace(/\n/g, '<br>')}</div>
        <div style="font-size:10px;color:var(--text-3);padding:6px 10px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:10px">
          <i class="ph ph-link" style="vertical-align:-1px"></i> 来源：${e.source}
        </div>
        ${e.relatedRisks.length > 0 ? `<div style="margin-bottom:10px">
          <div style="font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">关联风险</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${e.relatedRisks.map(r => {
            const risk = p.risks.find(x => x.kw === r);
            const lc = risk ? risk.lc : 'o';
            return `<a href="presale.html" onclick="event.stopPropagation();setCurrentProductId('${pid}')" class="tag tag-${lc}" style="cursor:pointer;text-decoration:none">${r}</a>`;
          }).join('')}</div>
        </div>` : ''}
        <div style="display:flex;gap:4px;flex-wrap:wrap">${e.tags.map(t => `<span style="font-size:10px;color:var(--text-3);padding:2px 6px;background:var(--bg);border-radius:100px">${t}</span>`).join('')}</div>
      </div></div>
    </div>`;
  }).join('');

  const filterBtns = [
    { f:'all', label:'全部', icon:'ph-list' },
    { f:'law', label:'法规', icon:'ph-scales' },
    { f:'standard', label:'标准', icon:'ph-certificate' },
    { f:'case', label:'案例', icon:'ph-newspaper-clipping' },
    { f:'internal', label:'内部', icon:'ph-buildings' },
    { f:'expert', label:'专家', icon:'ph-user-circle-gear' }
  ];

  const typeCounts = {};
  entries.forEach(e => { typeCounts[e.type] = (typeCounts[e.type] || 0) + 1 });

  document.getElementById('content').innerHTML = `
    <div class="au">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap" class="au d1">
        <div style="display:flex;align-items:center;gap:10px">
          <img src="${p.image}" style="width:40px;height:40px;border-radius:var(--r);object-fit:cover" onerror="this.style.display='none'">
          <div>
            <div style="font-size:13px;font-weight:600">${p.name}</div>
            <div style="font-size:11px;color:var(--text-3)">${p.industry} · ${p.platform}</div>
          </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:14px;font-size:12px">
          <div style="text-align:center"><span style="font-size:20px;font-weight:700;color:var(--accent)">${entries.length}</span><div style="font-size:10px;color:var(--text-3)">知识条目</div></div>
          <div style="text-align:center"><span style="font-size:20px;font-weight:700;color:var(--ok)">${coverCount}</span><div style="font-size:10px;color:var(--text-3)">覆盖风险</div></div>
          <div style="text-align:center"><span style="font-size:20px;font-weight:700;color:var(--text-2)">${Object.keys(typeCounts).length}</span><div style="font-size:10px;color:var(--text-3)">知识类型</div></div>
        </div>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap" class="au d1">
        ${filterBtns.map(b => {
          const cnt = b.f === 'all' ? entries.length : (typeCounts[b.f] || 0);
          return `<button class="btn btn-o btn-sm af-btn ${kbFilter === b.f ? 'active' : ''}" data-f="${b.f}" onclick="setKBFilter('${b.f}')"><i class="ph ${b.icon}" style="font-size:12px"></i> ${b.label} <span style="font-size:9px;color:var(--text-3);margin-left:2px">${cnt}</span></button>`;
        }).join('')}
      </div>

      <div id="kb-cards" class="au d2">
        ${cards || '<div style="text-align:center;padding:32px;color:var(--text-3);font-size:12px">该商品暂无知识库条目</div>'}
      </div>

      <div style="margin-top:24px;padding:20px;border:1px dashed var(--bd);border-radius:var(--r-lg);text-align:center" class="au d3">
        <div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px"><i class="ph ph-plugs-connected" style="font-size:16px;vertical-align:-3px;color:var(--accent)"></i> 连接企业知识源</div>
        <div style="font-size:11px;color:var(--text-3);margin-bottom:14px">接入已有文档，AI 自动匹配风险依据</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-o btn-sm" onclick="toast('飞书文档接入 — 企业版功能')"><i class="ph ph-paper-plane-tilt"></i> 飞书</button>
          <button class="btn btn-o btn-sm" onclick="toast('钉钉文档接入 — 企业版功能')"><i class="ph ph-chat-centered-text"></i> 钉钉</button>
          <button class="btn btn-o btn-sm" onclick="toast('Notion 接入 — 企业版功能')"><i class="ph ph-note-pencil"></i> Notion</button>
        </div>
      </div>
    </div>`;

  if (hlTarget) {
    setState('kb_highlight', '');
    setTimeout(() => {
      const el = document.getElementById('kb-' + hlTarget);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
      }
    }, 200);
  }
}

function setKBFilter(f) {
  kbFilter = f;
  setState('kb_filter_' + pid, f);
  renderKB();
}

renderKB();
</script>
</body>
</html>
